macros:
  "model": "Ternary-Bonsai-8B-Q2_0.gguf"
  "ctx": "65536"

cmd: |
  ${prism}
  ${defaults}
  --model ${models}/${model}
  -c ${ctx}
  --threads 2
  --batch-size 128
  --temperature 0.7
  --top-p 0.8
  --top-k 20
  --min-p 0.0
  --max-new-tokens 2048
  --prompt-template chatml
  --jinja
  --repeat-penalty 1.05
  --cache-type-k q8_0
  --cache-type-v q8_0

ttl: 360
